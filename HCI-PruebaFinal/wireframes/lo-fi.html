<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wireframe Lo-Fi - Global Dashboard Redesign</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800 font-sans p-8">
    <div class="max-w-5xl mx-auto border-4 border-dashed border-gray-300 p-6">
        <!-- Header / Navigation Placeholder -->
        <div class="flex justify-between items-center mb-8 pb-4 border-b-2 border-gray-200">
            <div class="w-32 h-8 bg-gray-200"></div> <!-- Logo -->
            <div class="flex gap-4">
                <div class="w-16 h-4 bg-gray-100"></div>
                <div class="w-16 h-4 bg-gray-100"></div>
                <div class="w-16 h-4 bg-gray-100"></div>
            </div>
        </div>

        <!-- Simplified Hero Section -->
        <div class="bg-gray-50 p-10 mb-8 text-center border-2 border-gray-200 rounded-lg">
            <div class="w-48 h-6 bg-gray-300 mx-auto mb-4"></div> <!-- Title -->
            <div class="w-64 h-4 bg-gray-200 mx-auto mb-6"></div> <!-- Subtitle -->
            <div class="flex justify-center gap-4">
                <div class="w-24 h-24 bg-gray-300 rounded-full"></div> <!-- Main Metric Circle -->
            </div>
        </div>

        <!-- KPI Grid -->
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="h-20 bg-gray-100 border border-gray-200 rounded p-2">
                <div class="w-1/2 h-3 bg-gray-300 mb-2"></div>
                <div class="w-3/4 h-5 bg-gray-400"></div>
            </div>
            <div class="h-20 bg-gray-100 border border-gray-200 rounded p-2">
                <div class="w-1/2 h-3 bg-gray-300 mb-2"></div>
                <div class="w-3/4 h-5 bg-gray-400"></div>
            </div>
            <div class="h-20 bg-gray-100 border border-gray-200 rounded p-2">
                <div class="w-1/2 h-3 bg-gray-300 mb-2"></div>
                <div class="w-3/4 h-5 bg-gray-400"></div>
            </div>
            <div class="h-20 bg-gray-100 border border-gray-200 rounded p-2">
                <div class="w-1/2 h-3 bg-gray-300 mb-2"></div>
                <div class="w-3/4 h-5 bg-gray-400"></div>
            </div>
        </div>

        <!-- Plans Table Area -->
        <div class="border-2 border-gray-200 rounded-lg overflow-hidden">
            <div class="bg-gray-100 p-4 flex justify-between">
                <div class="w-40 h-6 bg-gray-300"></div> <!-- Title -->
                <div class="w-32 h-6 bg-gray-400 rounded"></div> <!-- Action Button -->
            </div>
            <div class="p-4 space-y-4">
                <div class="flex gap-4 items-center border-b border-gray-100 pb-2">
                    <div class="w-full h-8 bg-gray-50"></div>
                </div>
                <div class="flex gap-4 items-center border-b border-gray-100 pb-2">
                    <div class="w-full h-8 bg-gray-50"></div>
                </div>
                <div class="flex gap-4 items-center border-b border-gray-100 pb-2">
                    <div class="w-full h-8 bg-gray-50"></div>
                </div>
            </div>
        </div>

        <!-- Toast Notification Placeholder (New UX Feature) -->
        <div class="fixed bottom-4 right-4 w-48 h-12 bg-gray-400 opacity-50 border-2 border-gray-600 rounded flex items-center justify-center">
            <span class="text-xs text-white font-bold">Feedback Placeholder</span>
        </div>
    </div>
    <div class="mt-4 text-center text-gray-400 text-sm">Wireframe de Baja Fidelidad (Lo-Fi) - Estructural</div>
</body>
</html>
